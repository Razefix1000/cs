<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CS</title>
	<style>
		body { margin: 0; overflow: hidden; background-color: #111; }
		canvas { display: block; }
	</style>
</head>
<body>
	<script type="importmap">
	{
		"imports": {
			"three": "https://unpkg.com/three@0.160.0/build/three.module.js",
			"three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
		}
	}
	</script>
	<script type="module">
		import * as THREE from 'three';
		import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
		
		// scene setup
		const scene = new THREE.Scene();
		scene.background = new THREE.Color(0x8899bb);
		scene.fog = new THREE.Fog(0x8899bb, 60, 200);
		const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
		camera.position.set(0, 2, -62); // T-spawn
		const renderer = new THREE.WebGLRenderer({ antialias:true });
		renderer.setSize(window.innerWidth, window.innerHeight);
		document.body.appendChild(renderer.domElement);
		
		// add light
		const light = new THREE.AmbientLight(0x888899, 3);
		scene.add(light);
		const sun = new THREE.DirectionalLight(0xfff5e0, 2);
		sun.position.set(40, 80, 20);
		sun.castShadow = true;
		scene.add(sun);
		// fill light (bounce)
		const fill = new THREE.DirectionalLight(0xaabbcc, 0.5);
		fill.position.set(-20, 10, -20);
		scene.add(fill);
		
		// ── helpers ─────────────────────────────────────────────────────────────
		const boxes = [];   // all solid AABB collidables

		function addBox(w, h, d, x, y, z, color = 0x888888) {
			const m = new THREE.Mesh(
				new THREE.BoxGeometry(w, h, d),
				new THREE.MeshStandardMaterial({ color })
			);
			m.position.set(x, y, z);
			scene.add(m);
			boxes.push(m);
			return m;
		}

		// ── base floor ───────────────────────────────────────────────────────
		// Large ground plane (visual only, collision handled by y<=groundLevel)
		const floorGeo = new THREE.PlaneGeometry(200, 200);
		const floorMat = new THREE.MeshStandardMaterial({ color: 0x4a4a4a });
		const floor = new THREE.Mesh(floorGeo, floorMat);
		floor.rotation.x = -Math.PI / 2;
		scene.add(floor);

		// ── spawn labels (visual signs) ──────────────────────────────────────
		// T-Spawn south, CT-Spawn north.  Map runs Z: T=-70 → CT=+70
		// A-Site: east (+X), B-Site: west (-X), Mid: centre

		// ╔══════════════════════════════════════════════════════════╗
		// ║  MAP LAYOUT  (top-down, north = +Z)                     ║
		// ║                                                          ║
		// ║  CT-Spawn  [+Z end]                                     ║
		// ║    ├─ CT-Alley → A-Site (east)                         ║
		// ║    └─ CT-Alley → B-Site (west)                         ║
		// ║  Mid is an elevated catwalk connecting east-west        ║
		// ║  T-Spawn  [-Z end]                                      ║
		// ╚══════════════════════════════════════════════════════════╝

		// ── outer perimeter walls ────────────────────────────────────────────
		const WALL_H = 8, WALL_T = 2;
		// north wall
		addBox(160, WALL_H, WALL_T,   0, WALL_H/2,  80, 0x333333);
		// south wall
		addBox(160, WALL_H, WALL_T,   0, WALL_H/2, -80, 0x333333);
		// east wall
		addBox(WALL_T, WALL_H, 160,  80, WALL_H/2,   0, 0x333333);
		// west wall
		addBox(WALL_T, WALL_H, 160, -80, WALL_H/2,   0, 0x333333);

		// ── ground elevation pads ─────────────────────────────────────────────
		// Raised mid platform (elevated catwalk east-west)
		addBox(60, 1.5, 12,  0, 0.75,  5, 0x5a5a5a);   // mid road, slightly raised

		// A ramp up to A-site (east side, ramp is faked as a step sequence)
		addBox(8, 0.5, 12,  38, 0.25,  5, 0x606060);
		addBox(8, 1.0, 12,  46, 0.50,  5, 0x606060);
		addBox(8, 1.5, 12,  54, 0.75,  5, 0x606060);

		// B ramp up (west side)
		addBox(8, 0.5, 12, -38, 0.25,  5, 0x606060);
		addBox(8, 1.0, 12, -46, 0.50,  5, 0x606060);
		addBox(8, 1.5, 12, -54, 0.75,  5, 0x606060);

		// ── T-SPAWN ───────────────────────────────────────────────────────────
		// Spawn box (decorative barrier)
		addBox(30, 1, 6,   0, 0.5, -65, 0x3a3a6a);
		// T-Spawn side walls (funnels T's into two lanes)
		addBox(2, 5, 30,  14, 2.5, -52, 0x555577);
		addBox(2, 5, 30, -14, 2.5, -52, 0x555577);

		// ── CT-SPAWN ──────────────────────────────────────────────────────────
		addBox(30, 1, 6,   0, 0.5,  65, 0x3a6a3a);
		addBox(2, 5, 20,  14, 2.5,  55, 0x557755);
		addBox(2, 5, 20, -14, 2.5,  55, 0x557755);

		// ── LONG A LANE (east, T side south → A site north) ────────────────
		// corridor walls
		addBox(2, 6, 70,  26, 3, -15, 0x6a5a3a);   // inner wall
		addBox(2, 4, 50,  50, 2,  -5, 0x6a5a3a);   // outer wall segment

		// A-SITE platform (elevated +1.5 above ground)
		addBox(28, 1.5, 28,  62, 0.75, 30, 0x707050);

		// A-site bomb marker (flat pad)
		addBox(6, 0.1, 6,  62, 1.55, 30, 0xdddd00);

		// Cover on A-site
		addBox(4, 3, 2,  55, 2.5, 25, 0x888866);
		addBox(2, 3, 6,  68, 2.5, 36, 0x888866);
		addBox(6, 3, 2,  62, 2.5, 40, 0x888866);
		// boost box on A
		addBox(3, 2, 3,  70, 2,  18, 0x999977);

		// A SHORT (CT short cut to A)
		addBox(2, 5, 30,  48, 2.5, 42, 0x6a5a3a);
		addBox(16, 5, 2,  56, 2.5, 57, 0x6a5a3a);

		// ── LONG B LANE (west, T side south → B site north) ────────────────
		addBox(2, 6, 70, -26, 3, -15, 0x3a5a6a);
		addBox(2, 4, 50, -50, 2,  -5, 0x3a5a6a);

		// B-SITE platform (slightly elevated)
		addBox(28, 1.0, 28, -62, 0.50, 30, 0x507070);

		// B-site bomb marker
		addBox(6, 0.1, 6, -62, 1.05, 30, 0xdddd00);

		// Cover on B-site
		addBox(2, 3, 8, -55, 2.5, 28, 0x668888);
		addBox(8, 3, 2, -62, 2.5, 40, 0x668888);
		addBox(4, 3, 2, -70, 2.5, 24, 0x668888);
		// B boxes (stack)
		addBox(3, 2, 3, -68, 2,  18, 0x779999);
		addBox(3, 1, 3, -68, 3.5, 18, 0x779999);

		// B SHORT (CT short)
		addBox(2, 5, 30, -48, 2.5, 42, 0x3a5a6a);
		addBox(16, 5, 2, -56, 2.5, 57, 0x3a5a6a);

		// ── MID AREA ─────────────────────────────────────────────────────────
		// Mid is a cross-road between the two lanes
		// Mid upper catwalk (elevated walkable platform, +3 above street)
		addBox(14, 3, 3,  0, 1.5, 5, 0x5a5050);    // mid street level blocker / steps

		// Mid catwalk spans A-to-B at height 3
		addBox(60, 1, 4,   0, 3.5, 8, 0x707060);   // catwalk deck
		// catwalk railings (thin walls)
		addBox(60, 1.5, 0.3,  0, 4.5,  10.1, 0x555545);
		addBox(60, 1.5, 0.3,  0, 4.5,   5.9, 0x555545);

		// Catwalk support pillars
		for (let px = -25; px <= 25; px += 12.5) {
			addBox(1.5, 3.5, 1.5, px, 1.75, 8, 0x444444);
		}

		// Mid boost box
		addBox(3, 1.5, 3, 0, 0.75, -5, 0x888888);

		// Mid connector to A (eastern ramp off catwalk down to A long)
		addBox(4, 1, 10, 28, 3, 8, 0x707060);

		// Mid connector to B (western ramp off catwalk)
		addBox(4, 1, 10, -28, 3, 8, 0x707060);

		// ── CITY BUILDINGS (decorative + blocking walls) ──────────────────
		// Block out buildings that form the city silhouette
		// Building A side far
		addBox(12, 14, 12,  72, 7, -20, 0x5a5050);
		addBox(8,  18, 8,   72, 9,  -8, 0x4a4040);
		// Building B side far
		addBox(12, 14, 12, -72, 7, -20, 0x505a5a);
		addBox(8,  18, 8,  -72, 9,  -8, 0x404a4a);
		// Mid cityscape buildings
		addBox(10, 12, 10,  20, 6,  -35, 0x504a50);
		addBox(10, 16, 10, -20, 8,  -35, 0x504a50);
		addBox(10, 10, 10,   0, 5,  -45, 0x605858);
		// CT side buildings
		addBox(10, 12, 10,  20, 6,   55, 0x4a5550);
		addBox(10, 10, 10, -20, 5,   55, 0x4a5550);

		// ── STREET PROPS (crates, dumpsters, barriers) ────────────────────
		// T side street crates
		addBox(2, 2, 2, -5, 1, -40, 0x887755);
		addBox(2, 2, 2,  5, 1, -40, 0x887755);
		addBox(2, 2, 2,  0, 3, -40, 0x887755);   // stacked
		// Mid street barrier
		addBox(6, 1.2, 0.4,  0, 0.6, -15, 0xaaaaaa);
		addBox(6, 1.2, 0.4,  0, 0.6,  20, 0xaaaaaa);
		// Dumpsters
		addBox(3, 2, 1.5,  18, 1, -28, 0x336633);
		addBox(3, 2, 1.5, -18, 1, -28, 0x336633);
		// CT side barriers
		addBox(4, 1.2, 0.4,  10, 0.6, 45, 0xaaaaaa);
		addBox(4, 1.2, 0.4, -10, 0.6, 45, 0xaaaaaa);
		
		// pistol weapon
		const pistol = new THREE.Group();
		
		// grip
		const grip = new THREE.Mesh(
		new THREE.BoxGeometry(0.15, 0.5, 0.25),
		new THREE.MeshStandardMaterial({ color: 0x888888 })
	);
	grip.position.set(0, -0.25, 0);
	pistol.add(grip);
	
	// barrel
	const barrel = new THREE.Mesh(
		new THREE.BoxGeometry(0.1, 0.1, 0.75),
		new THREE.MeshStandardMaterial({ color: 0xaaaaaa })
	);
	barrel.position.set(0, 0.1, -0.375);
	pistol.add(barrel);
	
	// slide
	const slide = new THREE.Mesh(
		new THREE.BoxGeometry(0.175, 0.2, 0.6),
		new THREE.MeshStandardMaterial({ color: 0x666666 })
	);
	slide.position.set(0, 0.1, -0.15);
	pistol.add(slide);
	
	// add pistol to scene (will update position in animation loop)
	scene.add(pistol);
	
	// controls
		const controls = new PointerLockControls(camera, document.body);
		
		document.addEventListener('click', () => {
			controls.lock();
		});
		
		// movement logic
		let moveForward = false;
		let moveBackward = false;
		let moveLeft = false;
		let moveRight = false;
		let sneak = false;
		let crouch = false;
		let canJump = false;
		const velocity = new THREE.Vector3();
		const direction = new THREE.Vector3();
		
		const oneKeyDown = (event) => {
			if (controls.isLocked) {
				event.preventDefault();
				event.stopPropagation();
			}
			switch (event.code) {
				case 'KeyW': moveForward = true; break;
				case 'KeyS': moveBackward = true; break;
				case 'KeyA': moveLeft = true; break;
				case 'KeyD': moveRight = true; break;
				case 'ShiftLeft': sneak = true; break;
				case 'KeyC': crouch = true; break;
				case 'Space': 
					if (canJump) {
						velocity.y = 8;
						canJump = false;
					}
					break;
			}
		};
		
		const oneKeyUp = (event) => {
			if (controls.isLocked) {
				event.preventDefault();
				event.stopPropagation();
			}
			switch (event.code) {
				case 'KeyW': moveForward = false; break;
				case 'KeyS': moveBackward = false; break;
				case 'KeyA': moveLeft = false; break;
				case 'KeyD': moveRight = false; break;
				case 'ShiftLeft': sneak = false; break;
				case 'KeyC': crouch = false; break;
			}
		};
		document.addEventListener('keydown', oneKeyDown);
		document.addEventListener('keyup', oneKeyUp);
		
		
		// animation loop
		let prevTime = performance.now();
		function animate() {
			requestAnimationFrame(animate);
			
			if (controls.isLocked) {
				const time = performance.now();
				const delta = (time - prevTime) / 1000;
				
				velocity.x -= velocity.x * 10.0 * delta;
				velocity.z -= velocity.z * 10.0 * delta;
				
				direction.z = Number(moveForward) - Number(moveBackward);
				direction.x = Number(moveRight) - Number(moveLeft);

				// apply movement with sneak multiplier
				let speed = sneak ? 150.0 : 200.0;
				speed = crouch ? 100.0 : speed;
				if(moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
				if(moveLeft || moveRight) velocity.x -= direction.x * speed * delta;

				controls.moveRight(-velocity.x * delta);
				controls.moveForward(-velocity.z * delta);

				// ── collision resolution ─────────────────────────────────
				const playerRadius = 0.45;
				const playerHeight = crouch ? 1.0 : 2.0;  // eye height above feet
				const playerFeet = camera.position.y - playerHeight;
				const playerTop  = camera.position.y + 0.1;

				// Step-up threshold: auto-climb surfaces up to this height above feet
				const stepUp = 0.7;

				// PASS 1 – find the highest surface directly under the player (for step-up)
				let supportY = 0; // base floor
				for (const box of boxes) {
					const bx = box.position.x, bz = box.position.z;
					const hw = box.geometry.parameters.width  / 2;
					const hd = box.geometry.parameters.depth  / 2;
					const hh = box.geometry.parameters.height / 2;
					const boxTop    = box.position.y + hh;
					const boxBottom = box.position.y - hh;
					if (Math.abs(camera.position.x - bx) < hw + playerRadius &&
						Math.abs(camera.position.z - bz) < hd + playerRadius) {
						// box top within step-up range and below player top
						if (boxTop > supportY && boxTop <= playerFeet + stepUp && boxTop >= boxBottom) {
							supportY = boxTop;
						}
					}
				}

				// PASS 2 – horizontal push-out (only for walls/boxes the player can't step over)
				for (const box of boxes) {
					const bx = box.position.x, bz = box.position.z;
					const hw = box.geometry.parameters.width  / 2;
					const hd = box.geometry.parameters.depth  / 2;
					const hh = box.geometry.parameters.height / 2;
					const boxTop    = box.position.y + hh;
					const boxBottom = box.position.y - hh;

					// Only collide horizontally with boxes taller than step-up
					if (boxTop <= playerFeet + stepUp) continue;  // can step over
					if (boxBottom >= playerTop) continue;          // above head
					if (boxTop < playerFeet) continue;             // below feet entirely

					const dx = camera.position.x - bx;
					const dz = camera.position.z - bz;
					const overlapX = (hw + playerRadius) - Math.abs(dx);
					const overlapZ = (hd + playerRadius) - Math.abs(dz);
					if (overlapX > 0 && overlapZ > 0) {
						if (overlapX < overlapZ) {
							camera.position.x += Math.sign(dx) * overlapX;
							velocity.x = 0;
						} else {
							camera.position.z += Math.sign(dz) * overlapZ;
							velocity.z = 0;
						}
					}
				}

				// PASS 3 – vertical: gravity + landing
				velocity.y -= 25.0 * delta;
				camera.position.y += velocity.y * delta;

				const groundLevel = supportY + playerHeight;
				let grounded = false;

				if (camera.position.y <= groundLevel) {
					camera.position.y = groundLevel;
					velocity.y = 0;
					grounded = true;
				} else {
					// landing on top of boxes (falling)
					for (const box of boxes) {
						const bx = box.position.x, bz = box.position.z;
						const hw = box.geometry.parameters.width  / 2;
						const hd = box.geometry.parameters.depth  / 2;
						const hh = box.geometry.parameters.height / 2;
						const boxTop = box.position.y + hh;
						const feetNow = camera.position.y - playerHeight;
						if (velocity.y <= 0 &&
							feetNow <= boxTop && feetNow >= boxTop - 1.2 &&
							Math.abs(camera.position.x - bx) < hw + playerRadius &&
							Math.abs(camera.position.z - bz) < hd + playerRadius) {
							camera.position.y = boxTop + playerHeight;
							velocity.y = 0;
							grounded = true;
						}
					}
				}
				canJump = grounded;

				prevTime = time;
			}
			
			// update pistol position to follow camera
			const offset = new THREE.Vector3(0.45, -0.3, -0.8);
			offset.applyQuaternion(camera.quaternion);
			pistol.position.copy(camera.position).add(offset);
			pistol.rotation.copy(camera.rotation);
			
			renderer.render(scene, camera);
		}
		
		window.addEventListener('resize', () => {
			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();
			renderer.setSize(window.innerWidth, window.innerHeight);
		});
		animate();
	</script>
</body>
</html>

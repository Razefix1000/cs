<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CS</title>
	<style>
		body { margin: 0; overflow: hidden; background-color: #111; }
		canvas { display: block; }
	</style>
</head>
<body>
	<script type="importmap">
	{
		"imports": {
			"three": "https://unpkg.com/three@0.160.0/build/three.module.js",
			"three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
		}
	}
	</script>
	<script type="module">
		import * as THREE from 'three';
		import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
		
		// scene setup
		const scene = new THREE.Scene();
		scene.background = new THREE.Color(0x87ceeb);
		const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
		camera.position.y = 2;
		const renderer = new THREE.WebGLRenderer({ antialias:true });
		renderer.setSize(window.innerWidth, window.innerHeight);
		document.body.appendChild(renderer.domElement);
		
		// add light
		const light = new THREE.AmbientLight(0x404040, 2);
		scene.add(light);
		const sun = new THREE.DirectionalLight(0xffffff, 1);
		sun.position.set(10, 10, 10);
		scene.add(sun);
		
		// floor
		const floorGeo = new THREE.PlaneGeometry(100, 100);
		const floorMat = new THREE.MeshStandardMaterial( {color:0x555555 });
		const floor = new THREE.Mesh(floorGeo, floorMat);
		floor.rotation.x = -Math.PI / 2;
		scene.add(floor);
		
		// rand cubes
		for(let i=0; i<20; i++) {
			const box = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshStandardMaterial({color: Math.random() * 0xffffff}));
			box.position.set(Math.random()*40-20, 1, Math.random()*40-20);
			scene.add(box);
		}
		
		// pistol weapon
		const pistol = new THREE.Group();
		
		// grip
		const grip = new THREE.Mesh(
		new THREE.BoxGeometry(0.15, 0.5, 0.25),
		new THREE.MeshStandardMaterial({ color: 0x888888 })
	);
	grip.position.set(0, -0.25, 0);
	pistol.add(grip);
	
	// barrel
	const barrel = new THREE.Mesh(
		new THREE.BoxGeometry(0.1, 0.1, 0.75),
		new THREE.MeshStandardMaterial({ color: 0xaaaaaa })
	);
	barrel.position.set(0, 0.1, -0.375);
	pistol.add(barrel);
	
	// slide
	const slide = new THREE.Mesh(
		new THREE.BoxGeometry(0.175, 0.2, 0.6),
		new THREE.MeshStandardMaterial({ color: 0x666666 })
	);
	slide.position.set(0, 0.1, -0.15);
	pistol.add(slide);
	
	// add pistol to scene (will update position in animation loop)
	scene.add(pistol);
	
	// controls
		const controls = new PointerLockControls(camera, document.body);
		
		document.addEventListener('click', () => {
			controls.lock();
		});
		
		// movement logic
		let moveForward = false;
		let moveBackward = false;
		let moveLeft = false;
		let moveRight = false;
		let sprint = false;
		let crouch = false;
		let canJump = false;
		const velocity = new THREE.Vector3();
		const direction = new THREE.Vector3();
		
		const oneKeyDown = (event) => {
			if (controls.isLocked) {
				event.preventDefault();
				event.stopPropagation();
			}
			switch (event.code) {
				case 'KeyW': moveForward = true; break;
				case 'KeyS': moveBackward = true; break;
				case 'KeyA': moveLeft = true; break;
				case 'KeyD': moveRight = true; break;
				case 'ShiftLeft': sprint = true; break;
				case 'KeyC': crouch = true; break;
				case 'Space': 
					if (canJump) {
						velocity.y = 8;
						canJump = false;
					}
					break;
			}
		};
		
		const oneKeyUp = (event) => {
			if (controls.isLocked) {
				event.preventDefault();
				event.stopPropagation();
			}
			switch (event.code) {
				case 'KeyW': moveForward = false; break;
				case 'KeyS': moveBackward = false; break;
				case 'KeyA': moveLeft = false; break;
				case 'KeyD': moveRight = false; break;
				case 'ShiftLeft': sprint = false; break;
				case 'KeyC': crouch = false; break;
			}
		};
		document.addEventListener('keydown', oneKeyDown);
		document.addEventListener('keyup', oneKeyUp);
		
		
		// animation loop
		let prevTime = performance.now();
		function animate() {
			requestAnimationFrame(animate);
			
			if (controls.isLocked) {
				const time = performance.now();
				const delta = (time - prevTime) / 1000;
				
				velocity.x -= velocity.x * 10.0 * delta;
				velocity.z -= velocity.z * 10.0 * delta;
				
				direction.z = Number(moveForward) - Number(moveBackward);
				direction.x = Number(moveRight) - Number(moveLeft);

				// apply movement with sprint multiplier
				const speed = sprint ? 300.0 : 200.0;
				if(moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
				if(moveLeft || moveRight) velocity.x -= direction.x * speed * delta;

			// apply gravity
			velocity.y -= 25.0 * delta;
		
			
			controls.moveRight(-velocity.x * delta);
			controls.moveForward(-velocity.z * delta);
			
			// apply vertical movement and ground collision
			camera.position.y += velocity.y * delta;
			
			const groundLevel = crouch ? 1 : 2;
			if (camera.position.y <= groundLevel) {
				camera.position.y = groundLevel;
					velocity.y = 0;
					canJump = true;
				}
				
				prevTime = time;
			}
			
			// update pistol position to follow camera
			const offset = new THREE.Vector3(0.45, -0.3, -0.8);
			offset.applyQuaternion(camera.quaternion);
			pistol.position.copy(camera.position).add(offset);
			pistol.rotation.copy(camera.rotation);
			
			renderer.render(scene, camera);
		}
		
		window.addEventListener('resize', () => {
			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();
			renderer.setSize(window.innerWidth, window.innerHeight);
		});
		animate();
	</script>
</body>
</html>
